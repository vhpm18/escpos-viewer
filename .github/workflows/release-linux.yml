name: Linux Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
  workflow_run:
    workflows: ["Release-plz"]
    types:
      - completed

permissions:
  contents: write

jobs:
  build-and-release:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}

      - name: Compute version from tag
        id: vars
        shell: bash
        run: |
          tag=""

          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            tag=$(git tag --points-at HEAD --list 'v*' | head -1)
          else
            tag="${{ github.ref_name }}"
            case "$tag" in
              v*) ;;
              *) tag="" ;;
            esac
          fi

          if [ -z "$tag" ]; then
            echo "has_tag=false" >> "$GITHUB_OUTPUT"
            echo "No v* tag available; skipping release."
            exit 0
          fi

          version="${tag#v}"
          echo "has_tag=true" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Detected tag: $tag, version: $version"

      - name: Install Rust
        if: steps.vars.outputs.has_tag == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Install system deps
        if: steps.vars.outputs.has_tag == 'true'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libxdo-dev

      - name: Rust cache
        if: steps.vars.outputs.has_tag == 'true'
        uses: Swatinem/rust-cache@v2

      - name: Build (release)
        if: steps.vars.outputs.has_tag == 'true'
        run: cargo build --release

      - name: Create Linux package
        if: steps.vars.outputs.has_tag == 'true'
        shell: bash
        run: |
          VERSION="${{ steps.vars.outputs.version }}"
          PKG_NAME="escpos-viewer-${VERSION}-x86_64-linux"
          PKG_DIR="packaging/release/${PKG_NAME}"
          mkdir -p "${PKG_DIR}"

          # Binary
          cp "target/release/escpos_viewer" "${PKG_DIR}/escpos-viewer"

          # Desktop integration (from Plan 003)
          if [ -f packaging/escpos-viewer.desktop ]; then
            cp packaging/escpos-viewer.desktop "${PKG_DIR}/"
          fi
          if [ -f packaging/escpos-viewer.png ]; then
            cp packaging/escpos-viewer.png "${PKG_DIR}/"
          fi

          # Docs
          cp README.md "${PKG_DIR}/"
          cp LICENSE.md "${PKG_DIR}/" 2>/dev/null || true

          # Tarball
          cd packaging/release
          tar czf "${PKG_NAME}.tar.gz" "${PKG_NAME}"
          echo "Created: packaging/release/${PKG_NAME}.tar.gz"

      - name: Verify outputs
        if: steps.vars.outputs.has_tag == 'true'
        run: |
          ls -lh target/release/escpos_viewer
          ls -lh packaging/release/escpos-viewer-*.tar.gz

      - name: GitHub Release
        if: steps.vars.outputs.has_tag == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ steps.vars.outputs.tag }}"
          name: "${{ steps.vars.outputs.tag }}"
          generate_release_notes: true
          files: |
            target/release/escpos_viewer
            packaging/release/escpos-viewer-*.tar.gz
